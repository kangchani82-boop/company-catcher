<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기업 상세 — Company Catcher</title>
  <script src="common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    .co-wrap { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }

    /* 헤더 */
    .co-header {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 24px; margin-bottom: 16px; display: flex; gap: 16px; align-items: flex-start;
    }
    .co-corp-icon {
      width: 52px; height: 52px; border-radius: 12px; background: var(--acc);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      flex-shrink: 0; color: #fff; font-weight: 700;
    }
    .co-corp-info { flex: 1; }
    .co-corp-name { font-size: 22px; font-weight: 700; color: var(--txt1); margin-bottom: 6px; }
    .co-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--txt2); align-items: center; }
    .co-chip {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 10px; font-size: 11px; color: var(--txt1);
    }
    .co-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .co-btn {
      background: var(--bg3); border: 1px solid var(--border); color: var(--txt1);
      border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all .15s;
    }
    .co-btn:hover { border-color: var(--acc); color: var(--acc); }
    .co-btn.primary { background: var(--acc); border-color: var(--acc); color: #fff; }
    .co-btn.primary:hover { background: var(--acc2); }

    /* 섹션 탭 */
    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border);
      padding-bottom: 0; overflow-x: auto;
    }
    .tab-item {
      padding: 9px 16px; font-size: 13px; color: var(--txt2); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap;
      transition: all .15s; font-weight: 500;
    }
    .tab-item:hover { color: var(--txt1); }
    .tab-item.active { color: var(--acc); border-bottom-color: var(--acc); font-weight: 700; }

    /* 탭 콘텐츠 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* 2컬럼 레이아웃 */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 900px) { .three-col { grid-template-columns: 1fr 1fr; } }

    /* 카드 */
    .section-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px; margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px; font-weight: 700; color: var(--txt2); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .section-title .cnt {
      background: var(--bg3); border-radius: 10px; padding: 1px 8px;
      font-size: 10px; font-weight: 600; color: var(--txt1);
    }
    .section-title a { font-size: 10px; color: var(--acc); margin-left: auto; font-weight: 400; text-decoration: none; }

    /* 재무 지표 카드 */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    @media (max-width: 700px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi-box {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; text-align: center;
    }
    .kpi-label { font-size: 10px; color: var(--txt2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px; }
    .kpi-val { font-size: 18px; font-weight: 700; color: var(--txt1); }
    .kpi-val.pos { color: #2ecc71; }
    .kpi-val.neg { color: #e74c3c; }
    .kpi-sub { font-size: 10px; color: var(--txt2); margin-top: 4px; }

    /* 차트 */
    .chart-container { position: relative; height: 220px; }

    /* 공급망 D3 */
    #sc-svg { width: 100%; height: 320px; background: var(--bg3); border-radius: 8px; }

    /* 리스트 아이템 */
    .list-item {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 8px; text-decoration: none; display: block;
      color: inherit; transition: border-color .15s;
    }
    .list-item:hover { border-color: var(--acc); }
    .list-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
    .list-item-title { font-size: 13px; color: var(--txt1); font-weight: 500; line-height: 1.5;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .list-item-meta { font-size: 10px; color: var(--txt2); margin-top: 4px; }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* 공급망 관계 목록 */
    .sc-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .sc-row:last-child { border-bottom: none; }
    .sc-badge { border-radius: 4px; padding: 2px 7px; font-size: 9px; font-weight: 700; flex-shrink: 0; }
    .sc-partner { font-weight: 600; font-size: 12px; color: var(--txt1); flex: 1; }
    .sc-ctx { font-size: 10px; color: var(--txt2); line-height: 1.4; flex: 2;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }

    /* 로딩/에러 */
    .loading { text-align: center; color: var(--txt2); padding: 60px; font-size: 14px; }
    .empty   { text-align: center; color: var(--txt2); padding: 30px; font-size: 12px; }
    .error-box { background: rgba(231,76,60,.1); border:1px solid rgba(231,76,60,.3); border-radius:10px; padding:20px; text-align:center; color:#e74c3c; }
  </style>
</head>
<body>
<div id="app">
  <div id="nav-container"></div>
  <div class="co-wrap">
    <div id="header-area"><div class="loading">⏳ 기업 정보 로딩 중...</div></div>

    <!-- 탭 바 -->
    <div class="tab-bar" id="tab-bar" style="display:none">
      <div class="tab-item active" onclick="switchTab('financials')">💰 재무 현황</div>
      <div class="tab-item" onclick="switchTab('supply_chain')">🌐 공급망</div>
      <div class="tab-item" onclick="switchTab('comparisons')">📊 비교분석</div>
      <div class="tab-item" onclick="switchTab('leads')">🚨 취재단서</div>
      <div class="tab-item" onclick="switchTab('articles')">✍ 기사초안</div>
    </div>

    <!-- 재무 현황 탭 -->
    <div class="tab-panel active" id="tab-financials">
      <div class="loading">⏳ 재무 데이터 로딩 중...</div>
    </div>

    <!-- 공급망 탭 -->
    <div class="tab-panel" id="tab-supply_chain">
      <div class="loading">⏳ 공급망 데이터 로딩 중...</div>
    </div>

    <!-- 비교분석 탭 -->
    <div class="tab-panel" id="tab-comparisons">
      <div class="loading">⏳ 비교분석 로딩 중...</div>
    </div>

    <!-- 취재단서 탭 -->
    <div class="tab-panel" id="tab-leads">
      <div class="loading">⏳ 취재단서 로딩 중...</div>
    </div>

    <!-- 기사초안 탭 -->
    <div class="tab-panel" id="tab-articles">
      <div class="loading">⏳ 기사초안 로딩 중...</div>
    </div>
  </div>
</div>

<script>
initPage('comparisons');
document.getElementById('nav-container').innerHTML = '';

const API_BASE  = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? `http://${location.host}` : '';
const params    = new URLSearchParams(location.search);
const CORP_CODE = params.get('corp_code') || '';
const CORP_NAME = params.get('corp_name') || '';

const SC_COLORS = {
  customer:'#e74c3c', supplier:'#3498db', partner:'#2ecc71',
  competitor:'#f1c40f', subsidiary:'#9b59b6', parent:'#9b59b6',
};
const SC_KO = {
  customer:'고객사', supplier:'공급사', partner:'파트너',
  competitor:'경쟁사', subsidiary:'자회사', parent:'모회사',
};
const SEV_COLOR = { 5:'#e74c3c', 4:'#e67e22', 3:'#f1c40f', 2:'#3498db', 1:'#888' };

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
let _loadedTabs = new Set();
function switchTab(name) {
  document.querySelectorAll('.tab-item').forEach((el, i) => {
    const names = ['financials','supply_chain','comparisons','leads','articles'];
    el.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  if (!_loadedTabs.has(name)) {
    _loadedTabs.add(name);
    loadTab(name);
  }
}

// ── 초기 로드 ────────────────────────────────────────────────────────────────
async function init() {
  if (!CORP_CODE) {
    document.getElementById('header-area').innerHTML =
      '<div class="error-box">URL에 corp_code 파라미터가 필요합니다<br><a href="/comparisons.html" style="color:var(--acc)">← 비교분석 목록</a></div>';
    return;
  }

  // 헤더 정보 + 첫 번째 탭(financials) 동시 로드
  const [finResp, cmpResp] = await Promise.allSettled([
    fetch(`${API_BASE}/api/financials?corp_code=${encodeURIComponent(CORP_CODE)}&limit=10`),
    fetch(`${API_BASE}/api/ai/comparisons?corp_code=${encodeURIComponent(CORP_CODE)}&limit=1`),
  ]);

  const fins = finResp.status==='fulfilled' ? (await finResp.value.json()).financials||[] : [];
  const cmps = cmpResp.status==='fulfilled' ? (await cmpResp.value.json()).comparisons||[] : [];

  // 기업명 결정
  const corpName = CORP_NAME || (fins[0]?.corp_name) || (cmps[0]?.corp_name) || CORP_CODE;
  const stockCode = fins[0]?.stock_code || '';

  document.title = `${corpName} — Company Catcher`;
  renderHeader(corpName, stockCode, fins.length, cmps.length);
  document.getElementById('tab-bar').style.display = 'flex';

  // 재무 탭 즉시 렌더 (이미 데이터 있음)
  _loadedTabs.add('financials');
  renderFinancials(fins, corpName);
}

// ── 헤더 렌더 ────────────────────────────────────────────────────────────────
function renderHeader(corpName, stockCode, finCount, cmpCount) {
  const initial = (corpName||'?').substring(0, 1);
  document.getElementById('header-area').innerHTML = `
    <div class="co-header">
      <div class="co-corp-icon">${escHtml(initial)}</div>
      <div class="co-corp-info">
        <div class="co-corp-name">${escHtml(corpName)}</div>
        <div class="co-meta">
          <span class="co-chip">🏢 ${escHtml(CORP_CODE)}</span>
          ${stockCode ? `<span class="co-chip">📈 ${escHtml(stockCode)}</span>` : ''}
          ${finCount ? `<span class="co-chip">💰 재무 ${finCount}건</span>` : ''}
          ${cmpCount ? `<span class="co-chip">📊 분석 ${cmpCount}건</span>` : ''}
        </div>
      </div>
      <div class="co-actions">
        <a href="/supply_chain.html?corp_code=${encodeURIComponent(CORP_CODE)}&corp_name=${encodeURIComponent(corpName)}"
           class="co-btn">🌐 공급망 그래프</a>
        <a href="/comparisons.html?corp_code=${encodeURIComponent(CORP_CODE)}"
           class="co-btn primary">📊 비교분석</a>
      </div>
    </div>`;
}

// ── 탭별 로드 ────────────────────────────────────────────────────────────────
async function loadTab(name) {
  const el = document.getElementById(`tab-${name}`);
  try {
    if (name === 'supply_chain') {
      // 공급망 + 집중도 리스크 + 변화 감지 병렬 로드
      const [scResp, riskResp, chgResp] = await Promise.allSettled([
        fetch(`${API_BASE}/api/dart/supply_chain?corp_code=${encodeURIComponent(CORP_CODE)}&limit=200`),
        fetch(`${API_BASE}/api/supply-chain/concentration?corp_code=${encodeURIComponent(CORP_CODE)}`),
        fetch(`${API_BASE}/api/supply-chain/changes?corp_code=${encodeURIComponent(CORP_CODE)}`),
      ]);
      const scData   = scResp.status==='fulfilled'   ? (await scResp.value.json()) : {};
      const riskData = riskResp.status==='fulfilled' ? (await riskResp.value.json()) : {};
      const chgData  = chgResp.status==='fulfilled'  ? (await chgResp.value.json()) : {};
      renderSupplyChain(scData.supply_chain||[], riskData, chgData, el);
    } else if (name === 'comparisons') {
      const r = await fetch(`${API_BASE}/api/ai/comparisons?corp_code=${encodeURIComponent(CORP_CODE)}&limit=20`);
      const d = await r.json();
      renderComparisons(d.comparisons||[], el);
    } else if (name === 'leads') {
      const r = await fetch(`${API_BASE}/api/leads?corp_code=${encodeURIComponent(CORP_CODE)}&limit=30`);
      const d = await r.json();
      renderLeads(d.leads||[], el);
    } else if (name === 'articles') {
      const r = await fetch(`${API_BASE}/api/articles?corp_code=${encodeURIComponent(CORP_CODE)}&limit=20`);
      const d = await r.json();
      renderArticles(d.articles||[], el);
    }
  } catch(e) {
    el.innerHTML = `<div class="error-box">로드 오류: ${escHtml(e.message)}</div>`;
  }
}

// ── 재무 탭 ──────────────────────────────────────────────────────────────────
let _charts = {};
function renderFinancials(fins, corpName) {
  const el = document.getElementById('tab-financials');
  if (!fins.length) {
    el.innerHTML = '<div class="empty">재무 데이터가 없습니다.<br><small>fetch_financials.py 실행 후 확인하세요.</small></div>';
    return;
  }
  const sorted = [...fins].sort((a,b) => a.fiscal_year - b.fiscal_year);
  const latest = sorted[sorted.length - 1];

  el.innerHTML = `
    <!-- KPI 요약 -->
    <div class="section-card">
      <div class="section-title">💰 최근 재무 현황 (${latest.fiscal_year}년 ${latest.report_type==='annual'?'연간':'분기'})</div>
      <div class="kpi-grid">
        ${kpiBox('매출액', fmtWon(latest.revenue), '')}
        ${kpiBox('영업이익', fmtWon(latest.operating_income), latest.operating_income >= 0 ? 'pos':'neg',
            `${fmtPct(latest.operating_margin)} 이익률`)}
        ${kpiBox('순이익', fmtWon(latest.net_income), latest.net_income >= 0 ? 'pos':'neg',
            `ROE ${fmtPct(latest.roe)}`)}
        ${kpiBox('총자산', fmtWon(latest.total_assets), '',
            `부채비율 ${latest.debt_ratio!=null?latest.debt_ratio.toFixed(0)+'%':'-'}`)}
        ${kpiBox('총자본', fmtWon(latest.total_equity), '')}
        ${kpiBox('현금', fmtWon(latest.cash), '')}
        ${kpiBox('유동자산', fmtWon(latest.current_assets), '',
            `유동비율 ${latest.current_ratio!=null?latest.current_ratio.toFixed(0)+'%':'-'}`)}
        ${kpiBox('부채', fmtWon(latest.total_liabilities), latest.debt_ratio>200?'neg':'', '')}
      </div>
    </div>

    <!-- 차트 -->
    ${sorted.length > 1 ? `
    <div class="two-col">
      <div class="section-card">
        <div class="section-title">📈 매출 · 영업이익 추이</div>
        <div class="chart-container"><canvas id="chart-rev"></canvas></div>
      </div>
      <div class="section-card">
        <div class="section-title">📊 수익성 추이 (이익률 %)</div>
        <div class="chart-container"><canvas id="chart-margin"></canvas></div>
      </div>
    </div>

    <div class="two-col">
      <div class="section-card">
        <div class="section-title">🏦 재무구조 추이</div>
        <div class="chart-container"><canvas id="chart-bs"></canvas></div>
      </div>
      <div class="section-card">
        <div class="section-title">⚖️ 부채비율 · ROE 추이</div>
        <div class="chart-container"><canvas id="chart-ratio"></canvas></div>
      </div>
    </div>` : ''}

    <!-- 연도별 데이터 테이블 -->
    <div class="section-card">
      <div class="section-title">📋 연도별 재무 데이터</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr style="background:var(--bg3)">
              <th style="padding:8px 10px;text-align:left;border:1px solid var(--border);color:var(--txt2)">연도</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">매출액</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">영업이익</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">순이익</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">영업이익률</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">ROE</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">부채비율</th>
              <th style="padding:8px 10px;text-align:right;border:1px solid var(--border);color:var(--txt2)">총자산</th>
            </tr>
          </thead>
          <tbody>
            ${[...sorted].reverse().map(f => `
            <tr>
              <td style="padding:7px 10px;border:1px solid var(--border);color:var(--txt2)">${f.fiscal_year} ${f.report_type==='annual'?'연간':'분기'}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right">${fmtWon(f.revenue)}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right;color:${f.operating_income>=0?'#2ecc71':'#e74c3c'}">${fmtWon(f.operating_income)}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right;color:${f.net_income>=0?'#2ecc71':'#e74c3c'}">${fmtWon(f.net_income)}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right;color:${f.operating_margin>=0?'#2ecc71':'#e74c3c'}">${fmtPct(f.operating_margin)}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right;color:${f.roe>=0?'#2ecc71':'#e74c3c'}">${fmtPct(f.roe)}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right;color:${f.debt_ratio>200?'#e74c3c':''}">${f.debt_ratio!=null?f.debt_ratio.toFixed(1)+'%':'-'}</td>
              <td style="padding:7px 10px;border:1px solid var(--border);text-align:right">${fmtWon(f.total_assets)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  // 차트 그리기
  if (sorted.length > 1) {
    requestAnimationFrame(() => {
      drawRevChart(sorted);
      drawMarginChart(sorted);
      drawBsChart(sorted);
      drawRatioChart(sorted);
    });
  }
}

function kpiBox(label, val, cls, sub) {
  return `<div class="kpi-box">
    <div class="kpi-label">${escHtml(label)}</div>
    <div class="kpi-val ${cls}">${escHtml(val)}</div>
    ${sub ? `<div class="kpi-sub">${escHtml(sub)}</div>` : ''}
  </div>`;
}

const CHART_DEFAULTS = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { labels: { color:'#9aa0b8', font:{size:10}, boxWidth:12, padding:8 } } },
  scales: {
    x: { ticks:{color:'#9aa0b8',font:{size:9}}, grid:{color:'rgba(255,255,255,.05)'} },
    y: { ticks:{color:'#9aa0b8',font:{size:9}}, grid:{color:'rgba(255,255,255,.05)'} }
  }
};

function makeChart(id, type, data, optionsOverride) {
  const ctx = document.getElementById(id);
  if (!ctx) return;
  if (_charts[id]) { _charts[id].destroy(); }
  _charts[id] = new Chart(ctx, {
    type,
    data,
    options: { ...CHART_DEFAULTS, ...optionsOverride }
  });
}

function drawRevChart(sorted) {
  const labels = sorted.map(f => `${f.fiscal_year}`);
  makeChart('chart-rev', 'bar', {
    labels,
    datasets: [
      { label:'매출액(억)', data: sorted.map(f=>f.revenue!=null?+(f.revenue/1e8).toFixed(1):null),
        backgroundColor:'rgba(91,106,240,0.6)', borderColor:'rgba(91,106,240,0.9)', borderWidth:1, yAxisID:'y' },

// ── 공급망 탭 ────────────────────────────────────────────────────────────────
let _scSim = null;
let _scRelFilter = 'all';
let _scEdgesAll  = [];

function renderSupplyChain(edges, riskData, chgData, el) {
  _scEdgesAll = edges;
  if (!edges.length) {
    el.innerHTML = '<div class="empty">공급망 데이터가 없습니다.</div>';
    return;
  }

  const corpName = edges[0]?.corp_name || CORP_CODE;

  // 관계 유형별 카운트
  const typeCnt = {};
  edges.forEach(e => { typeCnt[e.relation_type] = (typeCnt[e.relation_type]||0)+1; });

  // ── 집중도 리스크 KPI ──
  const riskScore = riskData.risk_score ?? null;
  const riskLevel = riskData.risk_level ?? 'N/A';
  const riskColor = {HIGH:'#e74c3c', MED:'#f1c40f', LOW:'#2ecc71'}[riskLevel] || '#888';
  const bd        = riskData.breakdown || {};
  const alerts    = riskData.alerts    || [];

  const riskHtml = riskScore !== null ? `
    <div class="section-card" style="margin-bottom:14px">
      <div class="section-title">⚠️ 공급망 집중도 리스크</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px">
        <div class="kpi-box">
          <div class="kpi-label">종합 리스크 스코어</div>
          <div class="kpi-val" style="color:${riskColor}">${riskScore}</div>
          <div class="kpi-sub" style="color:${riskColor}">${riskLevel}</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">고객 집중도 (HHI)</div>
          <div class="kpi-val ${bd.customer_concentration?.level==='HIGH'?'neg':bd.customer_concentration?.level==='MED'?'':'pos'}">
            ${bd.customer_concentration?.hhi?.toFixed(0) ?? '-'}
          </div>
          <div class="kpi-sub">${bd.customer_concentration?.count ?? 0}개 고객사</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">공급사 집중도 (HHI)</div>
          <div class="kpi-val ${bd.supplier_concentration?.level==='HIGH'?'neg':bd.supplier_concentration?.level==='MED'?'':'pos'}">
            ${bd.supplier_concentration?.hhi?.toFixed(0) ?? '-'}
          </div>
          <div class="kpi-sub">${bd.supplier_concentration?.count ?? 0}개 공급사</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">의존 기업 수</div>
          <div class="kpi-val">${bd.systemic_exposure?.dependent_count ?? 0}</div>
          <div class="kpi-sub">다른 기업의 공급사 의존</div>
        </div>
      </div>
      ${alerts.length ? `
        <div style="display:flex;flex-direction:column;gap:6px">
          ${alerts.map(a => `
            <div style="background:${{HIGH:'rgba(231,76,60,.1)',MED:'rgba(241,196,15,.1)',LOW:'rgba(46,204,113,.1)'}[a.severity]||'var(--bg3)'};
              border:1px solid ${{HIGH:'rgba(231,76,60,.3)',MED:'rgba(241,196,15,.3)',LOW:'rgba(46,204,113,.3)'}[a.severity]||'var(--border)'};
              border-radius:6px;padding:8px 12px;font-size:11px;color:var(--txt1);display:flex;gap:8px;align-items:flex-start">
              <span style="font-size:13px">${{HIGH:'🔴',MED:'🟡',LOW:'🟢'}[a.severity]||'⚪'}</span>
              <span>${escHtml(a.msg)}</span>
            </div>`).join('')}
        </div>` : ''}
    </div>` : '';

  // ── 공급망 개요 + 필터 ──
  const typeFilterHtml = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
    ${['all','customer','supplier','partner','competitor'].map(t => `
      <button onclick="filterScRel('${t}')" id="sc-flt-${t}"
        style="background:${t==='all'?'var(--acc)':'var(--bg3)'};border:1px solid ${t==='all'?'var(--acc)':'var(--border)'};
               color:${t==='all'?'#fff':'var(--txt1)'};border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer">
        ${t==='all'?'전체':(SC_KO[t]||t)} ${t==='all'?edges.length:(typeCnt[t]||0)}
      </button>`).join('')}
  </div>`;

  // ── 리스크 시나리오 버튼 ──
  const scenarioHtml = `
    <div class="section-card" style="margin-bottom:14px">
      <div class="section-title">🎯 리스크 시나리오 시뮬레이션</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="co-btn" onclick="runScenario('disruption')">⛔ 공급 중단</button>
        <button class="co-btn" onclick="runScenario('demand_drop')">📉 수요 급감</button>
        <button class="co-btn" onclick="runScenario('bankruptcy')">💥 파산 가정</button>
        <button class="co-btn" onclick="loadThemeArticle()">📰 테마 기사 데이터</button>
      </div>
      <div id="sc-scenario-result" style="display:none"></div>

  // ── 공급망 변화 감지 섹션 ──

  el.innerHTML = `
    ${riskHtml}
    ${chgHtml}
    ${scenarioHtml}
    <div class="section-card" style="margin-bottom:14px">
      <div class="section-title">🌐 공급망 그래프 <span class="cnt">${edges.length}개 관계</span>
        <a href="/supply_chain.html?corp_code=${encodeURIComponent(CORP_CODE)}&corp_name=${encodeURIComponent(corpName)}">전체 그래프 →</a>

      ${typeFilterHtml}

      <div class="section-title">📋 관계 목록</div>
      <div id="sc-rel-list">
        ${renderScList(edges)}
      </div>
    </div>`;

  // D3 미니 그래프
  requestAnimationFrame(() => drawScGraph(edges));
}

function renderScList(edges) {
  const filtered = _scRelFilter === 'all' ? edges : edges.filter(e => e.relation_type === _scRelFilter);
  if (!filtered.length) return '<div class="empty">해당 관계 없음</div>';
  return filtered.map(e => `
    <div class="sc-row">
      <span class="sc-badge" style="background:${SC_COLORS[e.relation_type]||'#666'}20;color:${SC_COLORS[e.relation_type]||'#888'};border:1px solid ${SC_COLORS[e.relation_type]||'#666'}40">
        ${SC_KO[e.relation_type]||e.relation_type||'관련'}
      </span>
      <div class="sc-partner">${escHtml(e.partner_name||'')}</div>
      <div class="sc-ctx">${escHtml(e.context||'')}</div>
    </div>`).join('');
}

// ── 공급망 변화 감지 렌더 ───────────────────────────────────────────────────
let _chgData = null;
function renderChangeDetection(d) {
  _chgData = d;
  if (!d || d.error || !d.changes) {
    const msg = d?.message || '변화 감지 데이터 없음 (단일 보고서)';
    return `<div class="section-card" style="margin-bottom:14px">
      <div class="section-title">🔄 공급망 변화 감지</div>
      <div style="color:var(--txt2);font-size:12px;padding:8px 0">${escHtml(msg)}</div>
    </div>`;
  }

  const s   = d.summary || {};
  const cmp = d.compared || {};
  const sig = s.significance ?? 0;
  const sigColor = sig >= 60 ? '#e74c3c' : sig >= 30 ? '#f1c40f' : '#2ecc71';

  // 기간 선택기 (periods 배열)
  const periods = d.periods || [];
  const periodSelector = periods.length > 2 ? `
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--txt2)">비교 기간:</span>
      <select id="sc-chg-from" style="background:var(--bg3);border:1px solid var(--border);color:var(--txt1);border-radius:4px;padding:3px 8px;font-size:11px">
        ${periods.map((p,i) => `<option value="${escHtml(p.rcept_no)}" ${p.rcept_no===cmp.from?'selected':''}>${escHtml(p.label)}</option>`).join('')}
      </select>
      <span style="font-size:11px;color:var(--txt2)">→</span>
      <select id="sc-chg-to" style="background:var(--bg3);border:1px solid var(--border);color:var(--txt1);border-radius:4px;padding:3px 8px;font-size:11px">
        ${periods.map((p,i) => `<option value="${escHtml(p.rcept_no)}" ${p.rcept_no===cmp.to?'selected':''}>${escHtml(p.label)}</option>`).join('')}
      </select>
      <button onclick="reloadChanges()" style="background:var(--acc);color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer">재조회</button>
    </div>` : '';

  const newList  = d.changes.new_partners  || [];
  const lostList = d.changes.lost_partners || [];
  const chgList  = d.changes.relation_changed || [];
  const unchanged = d.changes.unchanged_count ?? 0;

  const relBadge = (rel) => {
    const colors = {customer:'#3498db',supplier:'#e74c3c',partner:'#f39c12',competitor:'#8e44ad'};
    const ko = {customer:'고객사',supplier:'공급사',partner:'파트너',competitor:'경쟁사'};
    const c = colors[rel] || '#888';
    return `<span style="background:${c}20;color:${c};border:1px solid ${c}40;border-radius:3px;padding:1px 6px;font-size:10px">${ko[rel]||rel}</span>`;
  };

  const listedBadge = (p) => p.is_listed
    ? `<span style="background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.3);border-radius:3px;padding:1px 5px;font-size:9px">📈상장</span>`
    : '';

  const renderRow = (p, color, icon) => `
    <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="font-size:12px">${icon}</span>
      ${relBadge(p.relation_type)}
      ${listedBadge(p)}
      <span style="color:var(--txt1);flex:1">${escHtml(p.partner_name)}</span>
      ${p.corp_code ? `<a href="/company_detail.html?corp_code=${p.corp_code}" style="color:var(--acc);font-size:10px">상세→</a>` : ''}
    </div>`;

  const renderRelChanged = (p) => `
    <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px">
      <span style="font-size:12px">🔁</span>
      ${relBadge(p.old_relation)} <span style="color:var(--txt2)">→</span> ${relBadge(p.new_relation)}
      <span style="color:var(--txt1);flex:1">${escHtml(p.partner_name)}</span>
      ${p.corp_code ? `<a href="/company_detail.html?corp_code=${p.corp_code}" style="color:var(--acc);font-size:10px">상세→</a>` : ''}
    </div>`;

  return `
  <div class="section-card" style="margin-bottom:14px" id="sc-chg-card">
    <div class="section-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>🔄 공급망 변화 감지</span>
      <span style="font-size:11px;font-weight:400;color:${sigColor}">중요도 ${sig}점</span>
    </div>
    <div style="font-size:11px;color:var(--txt2);margin-bottom:10px">
      ${escHtml(cmp.from_label)} → ${escHtml(cmp.to_label)} 비교
    </div>
    ${periodSelector}

    <!-- 요약 KPI -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">
      <div class="kpi-box">
        <div class="kpi-label">신규 파트너</div>
        <div class="kpi-val pos">${s.new ?? 0}</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-label">소멸 파트너</div>
        <div class="kpi-val neg">${s.lost ?? 0}</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-label">관계 변경</div>
        <div class="kpi-val" style="color:#f39c12">${s.changed ?? 0}</div>
      </div>
      <div class="kpi-box">
        <div class="kpi-label">유지</div>
        <div class="kpi-val">${unchanged}</div>
      </div>
    </div>

    <!-- 변화 목록 -->
    ${newList.length ? `
      <div style="font-weight:600;color:#2ecc71;font-size:11px;margin-bottom:4px">✅ 신규 등장 (${newList.length})</div>
      <div style="max-height:160px;overflow-y:auto;margin-bottom:10px">
        ${newList.map(p => renderRow(p,'#2ecc71','🟢')).join('')}
      </div>` : ''}

    ${lostList.length ? `
      <div style="font-weight:600;color:#e74c3c;font-size:11px;margin-bottom:4px">❌ 소멸 (${lostList.length})</div>
      <div style="max-height:160px;overflow-y:auto;margin-bottom:10px">
        ${lostList.map(p => renderRow(p,'#e74c3c','🔴')).join('')}
      </div>` : ''}

    ${chgList.length ? `
      <div style="font-weight:600;color:#f39c12;font-size:11px;margin-bottom:4px">🔁 관계 변경 (${chgList.length})</div>
      <div style="max-height:120px;overflow-y:auto">
        ${chgList.map(p => renderRelChanged(p)).join('')}
      </div>` : ''}

    ${!newList.length && !lostList.length && !chgList.length ? `
      <div style="color:var(--txt2);font-size:12px;padding:8px 0">변화 없음 (파트너 구성 동일)</div>` : ''}
  </div>`;
}

async function reloadChanges() {
  const fromEl = document.getElementById('sc-chg-from');
  const toEl   = document.getElementById('sc-chg-to');
  if (!fromEl || !toEl) return;
  const fromR = fromEl.value, toR = toEl.value;
  if (!fromR || !toR || fromR === toR) return;

  const card = document.getElementById('sc-chg-card');
  if (card) card.style.opacity = '0.5';
  try {
    const r = await fetch(`${API_BASE}/api/supply-chain/changes?corp_code=${encodeURIComponent(CORP_CODE)}&from=${encodeURIComponent(fromR)}&to=${encodeURIComponent(toR)}`);
    const d = await r.json();
    const newHtml = renderChangeDetection(d);
    const wrapper = document.createElement('div');
    wrapper.innerHTML = newHtml;
    card?.replaceWith(wrapper.firstElementChild);
  } catch(e) {
    if (card) { card.style.opacity = '1'; }
  }
}

function filterScRel(relType) {
  _scRelFilter = relType;
  // 버튼 스타일 갱신
  ['all','customer','supplier','partner','competitor'].forEach(t => {
    const btn = document.getElementById(`sc-flt-${t}`);
    if (!btn) return;
    const active = t === relType;
    btn.style.background = active ? 'var(--acc)' : 'var(--bg3)';
    btn.style.borderColor = active ? 'var(--acc)' : 'var(--border)';
    btn.style.color = active ? '#fff' : 'var(--txt1)';
  });
  // 목록 갱신
  const listEl = document.getElementById('sc-rel-list');
  if (listEl) listEl.innerHTML = renderScList(_scEdgesAll);
  // 그래프 갱신
  const filtered = relType === 'all' ? _scEdgesAll : _scEdgesAll.filter(e => e.relation_type === relType);
  drawScGraph(filtered);
}

// ── 리스크 시나리오 ──────────────────────────────────────────────────────────
async function runScenario(scenario) {
  const resEl = document.getElementById('sc-scenario-result');
  if (!resEl) return;
  resEl.style.display = 'block';
  resEl.innerHTML = '<div style="color:var(--txt2);font-size:12px">⏳ 시나리오 분석 중...</div>';
  try {
    const r = await fetch(`${API_BASE}/api/supply-chain/risk-scenario?corp_code=${encodeURIComponent(CORP_CODE)}&scenario=${scenario}`);
    const d = await r.json();
    if (d.error) { resEl.innerHTML = `<div class="error-box">${escHtml(d.error)}</div>`; return; }

    const w1 = d.wave1 || {};
    const w2 = d.wave2 || {};
    const sm = d.summary || {};

    resEl.innerHTML = `
      <div style="background:var(--bg3);border-radius:8px;padding:12px;font-size:12px">
        <div style="font-weight:700;color:var(--txt1);margin-bottom:6px;font-size:13px">
          ${escHtml(d.scenario_ko||'')}
        </div>
        <div style="color:var(--txt2);margin-bottom:10px">${escHtml(d.scenario_desc||'')}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
          <div class="kpi-box"><div class="kpi-label">총 영향 기업</div><div class="kpi-val">${sm.total_exposed||0}</div></div>
          <div class="kpi-box"><div class="kpi-label">상장사</div><div class="kpi-val">${sm.listed_exposed||0}</div></div>
          <div class="kpi-box"><div class="kpi-label">전파 단계</div><div class="kpi-val">${sm.propagation_depth||1}</div></div>
        </div>
        <div style="font-weight:600;color:var(--txt2);margin-bottom:6px">1차 타격 (${w1.total||0}개사) — ${escHtml(w1.label||'')}</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">
          ${(w1.companies||[]).slice(0,20).map(c=>`
            <span style="background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:4px;padding:2px 8px;font-size:10px;color:#e74c3c">

function drawScGraph(edges) {
  const svgEl = document.getElementById('sc-svg');
  if (!svgEl) return;

  const W = svgEl.clientWidth || 600;
  const H = 340;

  const svg = d3.select('#sc-svg');
  svg.selectAll('*').remove();
  svg.attr('height', H);

  const centerCode = CORP_CODE;
  const centerName = _scEdgesAll[0]?.corp_name || CORP_CODE;

  const nodeMap = new Map();
  nodeMap.set(centerCode, { id:centerCode, name:centerName, type:'center', degree:0 });

  const links = [];
  // 중복 엣지 합산
  const edgeMap = new Map();
  edges.forEach(e => {
    const key = `${e.relation_type}::${e.partner_name}`;
    if (!edgeMap.has(key)) edgeMap.set(key, { ...e, weight: 0 });
    edgeMap.get(key).weight++;
  });

  edgeMap.forEach((e) => {
    const nKey = `p::${e.partner_name}`;
    if (!nodeMap.has(nKey)) nodeMap.set(nKey, { id:nKey, name:e.partner_name, type:'partner', rel_type:e.relation_type, degree:0 });
    links.push({ source:centerCode, target:nKey, relation:e.relation_type, weight:e.weight });
    nodeMap.get(nKey).degree += e.weight;
    nodeMap.get(centerCode).degree++;
  });

  const nodes = [...nodeMap.values()];
  if (nodes.length <= 1) {
    svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
      .attr('fill','var(--txt2)').attr('font-size',13).text('관계 데이터 없음');
    return;
  }

  const zoom = d3.zoom().scaleExtent([.15,4]).on('zoom', e=>g.attr('transform',e.transform));
  svg.call(zoom);
  const g = svg.append('g');

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(100).strength(.5))
    .force('charge', d3.forceManyBody().strength(-220))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(d=>d.type==='center'?24:14));

  if (_scSim) _scSim.stop();
  _scSim = sim;

  // 링크
  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', d=>SC_COLORS[d.relation]||'#555')
    .attr('stroke-width', d=>Math.min(3, .8 + (d.weight||1)*.3))
    .attr('stroke-opacity', .55);

  // 노드
  const node = g.append('g').selectAll('g').data(nodes).join('g').attr('cursor','pointer')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (ev, d) => {
      if (d.type === 'center') return;
      // 파트너 클릭 시 하이라이트
      d3.selectAll('circle')
        .attr('stroke-width', n => n===d ? 3 : (n.type==='center'?3:1))
        .attr('stroke', n => n===d ? '#fff' : (n.type==='center'?'#fff':'transparent'));
    });

  node.append('circle')
    .attr('r', d=>d.type==='center'?18:Math.min(14,4+(d.degree||1)))
    .attr('fill', d=>d.type==='center'?'var(--acc)':(SC_COLORS[d.rel_type]||'#555'))
    .attr('stroke', d=>d.type==='center'?'#fff':'transparent')
    .attr('stroke-width', d=>d.type==='center'?3:1);

  node.append('text')
    .text(d=>d.name.length>9?d.name.substring(0,9)+'…':d.name)
    .attr('text-anchor','middle')
    .attr('dy', d=>(d.type==='center'?18:Math.min(14,4+(d.degree||1)))+12)
    .attr('font-size', 9).attr('fill','var(--txt2)').attr('pointer-events','none');

  sim.on('tick',()=>{
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x},${d.y})`);
  });

  // 자동 fitView
  setTimeout(() => {
    try {
      const b = g.node().getBBox();
      if (!b.width) return;
      const sc = Math.min(.85*W/b.width, .85*H/b.height, 2);
      const tx = (W - sc*b.width)/2 - sc*b.x;
      const ty = (H - sc*b.height)/2 - sc*b.y;
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
    } catch(_){}
  }, 900);
}

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function fmtWon(v) {
  if (v == null) return '-';
  const abs = Math.abs(v), sign = v < 0 ? '-' : '';
  if (abs >= 1e12) return sign + (abs/1e12).toFixed(1) + '조';
  if (abs >= 1e8)  return sign + (abs/1e8).toFixed(0) + '억';
  if (abs >= 1e4)  return sign + (abs/1e4).toFixed(0) + '만';
  return sign + v.toFixed(0);
}
function fmtPct(v) { if (v==null) return '-'; return (v>=0?'+':'') + v.toFixed(1) + '%'; }
