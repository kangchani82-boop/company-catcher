<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>취재단서 상세 — Company Catcher</title>
  <script src="common.js"></script>
  <style>
    .detail-outer { max-width: 1400px; margin: 0 auto; padding: 20px 16px; display: flex; gap: 20px; }
    .detail-main  { flex: 1; min-width: 0; }
    .detail-side  { width: 320px; flex-shrink: 0; }

    /* 헤더 배너 */
    .header-banner {
      border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
      position: relative; overflow: hidden;
    }
    .header-banner::before {
      content: ''; position: absolute; inset: 0; opacity: .08;
      background: repeating-linear-gradient(45deg, #fff, #fff 1px, transparent 1px, transparent 8px);
    }
    .banner-sev5 { background: linear-gradient(135deg, #c0392b, #e74c3c); }
    .banner-sev4 { background: linear-gradient(135deg, #d35400, #e67e22); }
    .banner-sev3 { background: linear-gradient(135deg, #b7950b, #f1c40f); color: #1a1a1a; }
    .banner-sev2 { background: linear-gradient(135deg, #1a6fa8, #3498db); }
    .banner-sev1 { background: linear-gradient(135deg, #555, #777); }
    .banner-inner { position: relative; z-index: 1; }
    .banner-badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .banner-badge {
      background: rgba(255,255,255,.2); border-radius: 6px; padding: 3px 10px;
      font-size: 11px; font-weight: 700; color: #fff; border: 1px solid rgba(255,255,255,.3);
    }
    .banner-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.4; margin-bottom: 6px; }
    .banner-sev3 .banner-title, .banner-sev3 .banner-badge { color: #1a1a1a; }
    .banner-sev3 .banner-badge { border-color: rgba(0,0,0,.2); background: rgba(0,0,0,.1); }
    .banner-meta { font-size: 12px; color: rgba(255,255,255,.8); display: flex; gap: 12px; flex-wrap: wrap; }
    .banner-sev3 .banner-meta { color: rgba(0,0,0,.6); }

    /* 툴바 */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar-btn {
      background: var(--bg3); border: 1px solid var(--border); color: var(--txt1);
      border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all .15s;
    }
    .toolbar-btn:hover { border-color: var(--acc); color: var(--acc); }
    .toolbar-btn.danger { color: #e74c3c; border-color: rgba(231,76,60,.3); }
    .toolbar-btn.danger:hover { background: rgba(231,76,60,.08); }
    .toolbar-btn.primary { background: var(--acc); border-color: var(--acc); color: #fff; }
    .toolbar-btn.primary:hover { background: var(--acc2); }
    .spacer { flex: 1; }

    /* 섹션 카드 */
    .section-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--txt2); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px;
    }
    .evidence-box {
      background: var(--bg3); border-left: 4px solid var(--acc);
      border-radius: 0 8px 8px 0; padding: 14px 16px;
      font-size: 13px; color: var(--txt1); line-height: 1.8; white-space: pre-wrap;
    }
    .detail-field { margin-bottom: 12px; }
    .field-label { font-size: 10px; font-weight: 700; color: var(--txt2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .field-value { font-size: 13px; color: var(--txt1); line-height: 1.7; }

    /* 상태 워크플로 */
    .status-flow { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-btn {
      border-radius: 8px; padding: 7px 14px; font-size: 12px; cursor: pointer;
      border: 1px solid; font-weight: 600; transition: all .15s; background: none;
    }
    .status-btn:hover { opacity: .85; }
    .status-btn.active { cursor: default; opacity: .6; }

    /* 사이드바 */
    .side-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; margin-bottom: 14px;
    }
    .side-title {
      font-size: 12px; font-weight: 700; color: var(--txt2); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .mini-card {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: border-color .15s;
      text-decoration: none; display: block; color: inherit;
    }
    .mini-card:hover { border-color: var(--acc); }
    .mini-card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
    .mini-card-title { font-size: 12px; color: var(--txt1); line-height: 1.4; margin-bottom: 3px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .mini-card-meta { font-size: 10px; color: var(--txt2); }

    /* 비교분석 링크 박스 */
    .comp-link-box {
      background: var(--bg3); border: 1px solid rgba(91,106,240,.3); border-radius: 10px;
      padding: 14px 16px; text-decoration: none; display: block; color: inherit; transition: border-color .15s;
    }
    .comp-link-box:hover { border-color: var(--acc); }
    .comp-link-title { font-size: 13px; font-weight: 600; color: var(--txt1); margin-bottom: 4px; }
    .comp-link-meta { font-size: 11px; color: var(--txt2); }

    /* 뉴스화 센터 */
    .newsify-center {
      background: linear-gradient(135deg, rgba(91,106,240,.08), rgba(91,106,240,.02));
      border: 2px solid rgba(91,106,240,.3); border-radius: 14px;
      padding: 20px 22px; margin-bottom: 14px;
    }
    .newsify-title {
      font-size: 14px; font-weight: 800; color: var(--txt1);
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .newsify-title span { font-size: 18px; }
    .newsify-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .btn-newsify-primary {
      flex: 1; min-width: 160px;
      background: linear-gradient(135deg, #5b6af0, #7b8af8);
      color: #fff; border: none; border-radius: 10px;
      padding: 14px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all .15s; box-shadow: 0 3px 12px rgba(91,106,240,.35);
    }
    .btn-newsify-primary:hover { background: linear-gradient(135deg, #4a5ae0, #6a7ae8); transform: translateY(-1px); box-shadow: 0 5px 18px rgba(91,106,240,.45); }
    .btn-newsify-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-newsify-secondary {
      flex: 1; min-width: 120px;
      background: var(--bg3); color: var(--txt1); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none; transition: all .15s;
    }
    .btn-newsify-secondary:hover { border-color: var(--acc); color: var(--acc); }

    .news-check-row {
      display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
      padding-top: 12px; border-top: 1px solid rgba(91,106,240,.2);
    }
    .news-check-label { font-size: 11px; color: var(--txt2); font-weight: 600; margin-right: 4px; }
    .news-search-pill {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
      padding: 4px 10px; font-size: 11px; color: var(--txt2); cursor: pointer;
      text-decoration: none; transition: all .12s;
    }
    .news-search-pill:hover { border-color: var(--acc); color: var(--acc); }

    .draft-exists-box {
      background: rgba(46,204,113,.08); border: 1px solid rgba(46,204,113,.3);
      border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; text-decoration: none; color: inherit; transition: border-color .15s;
    }
    .draft-exists-box:hover { border-color: #2ecc71; }
    .draft-exists-icon { font-size: 20px; }
    .draft-exists-info { flex: 1; }
    .draft-exists-title { font-size: 13px; font-weight: 700; color: var(--txt1); margin-bottom: 2px; }
    .draft-exists-meta { font-size: 11px; color: var(--txt2); }

    .loading { text-align:center; color:var(--txt2); padding:80px; font-size:14px; }
    .error-box { background: rgba(231,76,60,.1); border:1px solid rgba(231,76,60,.3);
      border-radius:10px; padding:20px; text-align:center; color:#e74c3c; }
  </style>
</head>
<body>
<div id="app">
  <div id="nav-container"></div>
  <div class="detail-outer">
    <div class="detail-main" id="main-content">
      <div class="loading">⏳ 취재단서 로딩 중...</div>
    </div>
    <div class="detail-side" id="side-content"></div>
  </div>
</div>
<script>
initPage('leads');

const API_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? `http://${location.host}` : '';
const params = new URLSearchParams(location.search);
const leadId = params.get('id');

const SEV_LABEL = { 5:'⭐⭐⭐ 즉시취재', 4:'⭐⭐ 당일검토', 3:'⭐ 주간검토', 2:'참고', 1:'낮음' };
const SEV_BG    = { 5:'banner-sev5', 4:'banner-sev4', 3:'banner-sev3', 2:'banner-sev2', 1:'banner-sev1' };
const TYPE_KO = {
  '2025_annual':'2025 사업보고서','2025_q3':'2025 3분기','2025_h1':'2025 반기','2025_q1':'2025 1분기'
};

let currentLead = null;

async function loadData() {
  if (!leadId) { showError('URL에 id 파라미터가 필요합니다'); return; }
  try {
    const resp = await fetch(`${API_BASE}/api/leads/${leadId}`);
    const data = await resp.json();
    if (!resp.ok) { showError(data.error || '취재단서를 불러올 수 없습니다'); return; }
    currentLead = data.lead;
    renderMain(data.lead);
    renderSide(data.lead);
  } catch(e) {
    showError('서버 연결 오류: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('main-content').innerHTML =
    `<div class="error-box"><div style="font-size:28px;margin-bottom:8px">😔</div><div>${escHtml(msg)}</div>
     <a href="/leads.html" class="toolbar-btn" style="display:inline-block;margin-top:14px">← 목록으로</a></div>`;
}

function renderMain(l) {
  const sev      = l.severity || 3;
  const bannerCls = SEV_BG[sev] || 'banner-sev3';
  const sevLabel  = SEV_LABEL[sev] || `sev${sev}`;
  const typeKo    = leadTypeKo(l.lead_type);
  const statusHtml = leadStatusBadge(l.status);

  document.title = `${l.corp_name||''} 취재단서 — Company Catcher`;

  document.getElementById('main-content').innerHTML = `
    <!-- 배너 헤더 -->
    <div class="header-banner ${escHtml(bannerCls)}">
      <div class="banner-inner">
        <div class="banner-badges">
          <span class="banner-badge">${escHtml(sevLabel)}</span>
          <span class="banner-badge">${escHtml(typeKo)}</span>
          <a class="banner-badge" href="/company_detail.html?corp_code=${encodeURIComponent(l.corp_code||'')}&corp_name=${encodeURIComponent(l.corp_name||l.corp_code||'')}"
             style="text-decoration:none;cursor:pointer">${escHtml(l.corp_name||l.corp_code)}</a>
        </div>
        <div class="banner-title">${escHtml(l.title||'제목 없음')}</div>
        <div class="banner-meta">
          <span>📅 ${fmtDate(l.created_at)}</span>
          ${l.status ? `<span>현황: ${l.status}</span>` : ''}
        </div>
      </div>
    </div>

    <!-- 툴바 -->
    <div class="toolbar">
      <a href="/leads.html" class="toolbar-btn">← 취재단서 목록</a>
      ${l.comparison_id ? `<a href="/comparison_detail.html?id=${l.comparison_id}" class="toolbar-btn">📊 비교분석 보기</a>` : ''}
      <span class="spacer"></span>
      <button class="toolbar-btn danger" onclick="excludeThisLead(${l.id})">🚫 제외</button>
    </div>

    <!-- ★ 뉴스화 센터 ★ -->
    <div class="newsify-center">
      <div class="newsify-title"><span>🗞️</span> 뉴스화 센터</div>

      <!-- 기존 초안이 있으면 먼저 표시 -->
      ${(l.drafts && l.drafts.length) ? l.drafts.map(d => `
        <a class="draft-exists-box" href="/article_detail.html?id=${d.id}">
          <div class="draft-exists-icon">📄</div>
          <div class="draft-exists-info">
            <div class="draft-exists-title">${escHtml(d.headline||'(제목 없음)')}</div>
            <div class="draft-exists-meta">${articleStatusBadge(d.status)} &nbsp;${fmtDateShort(d.created_at)} · ${escHtml(d.model||'')}</div>
          </div>
          <div style="font-size:10px;color:var(--acc)">열기 →</div>
        </a>
      `).join('') : ''}

      <div class="newsify-row">
        <button class="btn-newsify-primary" id="detail-draft-btn"
          onclick="generateDraftFromLead(${l.id}, '${escHtml((l.corp_name||'').replace(/'/g,"\\'"))}', this)">
          ✍ 기사 초안 생성${(l.drafts && l.drafts.length) ? ' (재생성)' : ''}
        </button>
        ${l.comparison_id ? `
        <a class="btn-newsify-secondary" href="/comparison_detail.html?id=${l.comparison_id}">
          📊 비교분석 원문
        </a>` : ''}
        <a class="btn-newsify-secondary" href="/articles.html?corp_code=${encodeURIComponent(l.corp_code||'')}">
          📄 이 기업 초안 목록
        </a>
      </div>

      <!-- 뉴스 보도 여부 확인 -->
      <div class="news-check-row">
        <span class="news-check-label">📡 보도 현황:</span>
        <span id="news-status-badge">${newsCoverBadgeHtml(l.news_status)}</span>
        <button id="news-check-btn"
          onclick="checkNewsCoverage(${l.id})"
          class="news-search-pill" style="cursor:pointer;border:none;padding:5px 12px;font-weight:700">
          🔍 보도 여부 확인
        </button>
        ${newsSearchLinks(l.corp_name||'', l.title||'')}
        ${newsSearchLinks(l.corp_name||'', typeKo)}
      </div>
      <div id="news-found-urls"></div>
    </div>

    <!-- 요약 -->
    ${l.summary ? `
    <div class="section-card">
      <div class="section-title">📝 요약</div>
      <div class="field-value" style="line-height:1.8">${escHtml(l.summary)}</div>
    </div>` : ''}

    <!-- 근거 -->
    ${l.evidence ? `
    <div class="section-card">
      <div class="section-title">📌 근거 원문</div>
      <div class="evidence-box">${escHtml(l.evidence)}</div>
    </div>` : ''}

    <!-- 상태 변경 -->
    <div class="section-card">
      <div class="section-title">🔄 상태 관리</div>
      <div class="detail-field">
        <div class="field-label">현재 상태</div>
        <div style="margin-bottom:12px">${statusHtml}</div>
      </div>
      <div class="status-flow" id="status-flow">
        ${renderStatusBtns(l.status)}
      </div>
    </div>

    <!-- 메타 정보 -->
    <div class="section-card">
      <div class="section-title">ℹ 상세 정보</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="detail-field">
          <div class="field-label">기업코드</div>
          <div class="field-value">${escHtml(l.corp_code||'-')}</div>
        </div>
        <div class="detail-field">
          <div class="field-label">단서 유형</div>
          <div class="field-value">${escHtml(typeKo)}</div>
        </div>
        <div class="detail-field">
          <div class="field-label">긴급도</div>
          <div class="field-value">${escHtml(sevLabel)}</div>
        </div>
        <div class="detail-field">
          <div class="field-label">생성일시</div>
          <div class="field-value">${fmtDate(l.created_at)}</div>
        </div>
        ${l.comparison_id ? `
        <div class="detail-field">
          <div class="field-label">연결 비교분석</div>
          <div class="field-value">#${l.comparison_id}</div>
        </div>` : ''}
        ${l.ai_model ? `
        <div class="detail-field">
          <div class="field-label">AI 모델</div>
          <div class="field-value">${escHtml(l.ai_model)}</div>
        </div>` : ''}
      </div>
    </div>
  `;
}

function renderStatusBtns(current) {
  const statuses = [
    { key: 'new',       label: '🆕 신규',    color: '#5b6af0' },
    { key: 'reviewing', label: '🔍 검토중',  color: '#e67e22' },
    { key: 'drafted',   label: '✍ 초안완료', color: '#2ecc71' },
    { key: 'published', label: '🗞️ 게재완료', color: '#3498db' },
    { key: 'archived',  label: '📦 보관',    color: '#888' },
  ];
  return statuses.map(s => `
    <button class="status-btn ${s.key===current?'active':''}"
      style="color:${s.color};border-color:${s.color};${s.key===current?`background:${s.color}20`:''}"
      onclick="changeStatus('${s.key}')" ${s.key===current?'disabled':''}>${s.label}</button>
  `).join('');
}

async function changeStatus(newStatus) {
  try {
    const resp = await fetch(`${API_BASE}/api/leads/${leadId}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': 'local' },
      body: JSON.stringify({ status: newStatus })
    });
    const d = await resp.json();
    if (!resp.ok) throw new Error(d.error || '오류');
    document.getElementById('status-flow').innerHTML = renderStatusBtns(newStatus);
    alert(`상태가 "${newStatus}"(으)로 변경되었습니다.`);
  } catch(e) {
    alert('상태 변경 오류: ' + e.message);
  }
}

// ── 뉴스 보도 여부 배지 HTML ─────────────────────────────────────────────────
function newsCoverBadgeHtml(status) {
  const map = {
    exclusive: ['🔴 독점 (미보도)', '#e74c3c', 'rgba(231,76,60,.15)', 'rgba(231,76,60,.4)'],
    partial:   ['🟡 일부보도',      '#d4ac0d', 'rgba(241,196,15,.15)', 'rgba(241,196,15,.4)'],
    covered:   ['🟢 기보도',        '#aaa',    'rgba(160,160,160,.15)', 'rgba(160,160,160,.3)'],
  };
  const [label, color, bg, border] = map[status] || ['🔵 보도확인 전', '#7a8af0', 'rgba(91,106,240,.1)', 'rgba(91,106,240,.3)'];
  return `<span style="display:inline-flex;align-items:center;gap:4px;border-radius:6px;
    padding:4px 10px;font-size:12px;font-weight:700;border:1px solid ${border};
    background:${bg};color:${color}">${label}</span>`;
}

// ── 뉴스 보도 여부 API 호출 ───────────────────────────────────────────────────
async function checkNewsCoverage(leadId) {
  const btn = document.getElementById('news-check-btn');
  const badgeEl = document.getElementById('news-status-badge');
  if (btn) { btn.textContent = '⏳ 확인 중...'; btn.disabled = true; }
  try {
    const resp = await fetch(`${API_BASE}/api/leads/${leadId}/check-news`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': 'local' },
    });
    const d = await resp.json();
    if (!resp.ok) throw new Error(d.error || '오류');
    if (badgeEl) badgeEl.innerHTML = newsCoverBadgeHtml(d.news_status);
    // 관련 URL 표시
    const urlsEl = document.getElementById('news-found-urls');
    if (urlsEl && (d.news_urls || []).length > 0) {
      urlsEl.innerHTML = `<div style="margin-top:8px;font-size:11px;color:var(--txt2)">
        <div style="margin-bottom:4px;font-weight:600">검색된 기사:</div>
        ${d.news_urls.slice(0,3).map(u =>
          `<a href="${u}" target="_blank" style="display:block;color:var(--acc);
            overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px">${u}</a>`
        ).join('')}
      </div>`;
    }
  } catch(e) {
    alert('뉴스 확인 오류: ' + e.message);
  } finally {
    if (btn) { btn.textContent = '🔍 보도 여부 재확인'; btn.disabled = false; }
  }
}

function renderSide(l) {
  const side = document.getElementById('side-content');
  const TYPE_KO = {
    '2025_annual':'사업보고서','2025_q3':'3분기','2025_h1':'반기','2025_q1':'1분기'
  };

  side.innerHTML = `
    <!-- 뉴스 검색 -->
    <div class="side-card">
      <div class="side-title">🔍 뉴스 검색</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${newsSearchLinks(l.corp_name||'', l.title||'')}
        ${newsSearchLinks(l.corp_name||'', leadTypeKo(l.lead_type))}
      </div>
    </div>

    <!-- 연결 비교분석 -->
    ${l.comparison_id ? `
    <div class="side-card">
      <div class="side-title">📊 연결된 비교분석</div>
      <a class="comp-link-box" href="/comparison_detail.html?id=${l.comparison_id}">
        <div class="comp-link-title">비교분석 #${l.comparison_id}</div>
        <div class="comp-link-meta">
          ${escHtml(TYPE_KO[l.type_a]||l.type_a||'')} → ${escHtml(TYPE_KO[l.type_b]||l.type_b||'')}
        </div>
        <div style="font-size:10px;color:var(--acc);margin-top:6px">전체 분석 보기 →</div>
      </a>
    </div>` : ''}

    <!-- AI 분석 미리보기 -->
    ${l.ai_result ? `
    <div class="side-card">
      <div class="side-title">🤖 AI 분석 요약</div>
      <div style="font-size:11px;color:var(--txt2);line-height:1.7;
        display:-webkit-box;-webkit-line-clamp:8;-webkit-box-orient:vertical;overflow:hidden">
        ${escHtml(l.ai_result.substring(0,500))}...
      </div>
      ${l.comparison_id ? `
      <a href="/comparison_detail.html?id=${l.comparison_id}" class="see-all" style="display:block;text-align:center;
        font-size:11px;color:var(--acc);padding:6px;border:1px dashed rgba(91,106,240,.3);
        border-radius:6px;margin-top:8px;text-decoration:none">전체 분석 보기 →</a>` : ''}
    </div>` : ''}

    <!-- 빠른 액션 -->
    <div class="side-card">
      <div class="side-title">⚡ 빠른 액션</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <button class="toolbar-btn primary" style="width:100%;justify-content:center"
          onclick="generateDraftFromLead(${l.id}, '${escHtml(l.corp_name||'')}', this)">
          ✍ 기사초안 생성
        </button>
        <a class="toolbar-btn" style="width:100%;justify-content:center;box-sizing:border-box"
          href="/articles.html?corp_code=${encodeURIComponent(l.corp_code)}">
          📄 이 기업 기사초안 목록
        </a>
        <a class="toolbar-btn" style="width:100%;justify-content:center;box-sizing:border-box"
          href="/comparisons.html?q=${encodeURIComponent(l.corp_name||'')}">
          📊 비교분석 목록
        </a>
      </div>
    </div>
  `;
}

async function excludeThisLead(id) {
  if (!confirm('이 취재단서를 제외(보관)할까요?\n"보관" 필터로 언제든 다시 볼 수 있습니다.')) return;
  try {
    const resp = await fetch(`${API_BASE}/api/leads/${id}/status`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': 'local' },
      body: JSON.stringify({ status: 'archived' }),
    });
    if (!resp.ok) throw new Error((await resp.json()).error || '오류');
    alert('제외(보관) 처리되었습니다. 목록으로 돌아갑니다.');
    location.href = '/leads.html';
  } catch(e) {
    alert('오류: ' + e.message);
  }
}

loadData();
</script>
</body>
</html>
