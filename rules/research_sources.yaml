# ══════════════════════════════════════════════════════════════════
# 사용 가이드
# ══════════════════════════════════════════════════════════════════
# 1. 단서(lead)에 매칭될 때 위 카탈로그를 우선순위 검색
# 2. weight × 시간 근접도(±60일) × 키워드 매칭 점수 = 최종 매칭 점수
# 3. 매칭 점수 ≥ 0.6 자료만 prompts에 주입
# 4. 인용은 항상 STEP 5 시사점 단락에만 (헤드라인·STEP 1~4 금지)
# 5. 인용 형식 예:
#    - 매일경제 2025-04-15 보도 (본지 자체 검증)
#    - 한국투자증권 2025-04-10 리서치 리포트 (제목)
#    - Gartner 2024 보고서 (Korean ESG Construction)
#    - 한국기업평가 신용평가 (2025-Q1)
