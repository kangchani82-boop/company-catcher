# ══════════════════════════════════════════════════════════════════
# 인용 형식 가이드
# ══════════════════════════════════════════════════════════════════
# T1 인용 예: "(매일경제 2025-04-15 보도, 본지 자체 검증)"
# T2 인용 예: "(전자신문 2025-04-10 — IT 전문지 보도)"
# T3 인용 예: "참고: 데일리안 보도(2025-04-12)"
# BLOCKED  : 절대 인용 금지

# ══════════════════════════════════════════════════════════════════
# 자동 룰
# ══════════════════════════════════════════════════════════════════
# 1. T1 매체 보도와 DART/financials 사실이 일치 → 인용 PASS
# 2. T2 매체 보도와 DART 사실이 일치 → 인용 PASS (단 [관련 보도] 박스로)
# 3. 보도와 1차 자료 불일치 → 인용 BLOCKED
# 4. 매체 식별 불가 → 인용 BLOCKED
# 5. 어떤 경우든 STEP 1~4 핵심 사실에는 외부 인용 금지 (STEP 5만)
