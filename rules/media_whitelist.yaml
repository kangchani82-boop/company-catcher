# 사용처: scripts/cite_verify.py 가 외부 매체 인용 후보를 평가할 때
#
# Tier 정의:
#   T1  — 최상위 신뢰. 본문 STEP 5(시사점)에 직접 인용 가능
#   T2  — 전문지·통신사. 시사점 보강용 인용 가능
#   T3  — 단순 보조. 사실 대조 필요 (수치는 1차 자료 우선)
#   BLOCKED — 인용 금지 (PR/광고/익명/저작권 위반 의심)
#
# 형식:
#   - domain: example.com
#     name: 매체명
#     tier: T1 / T2 / T3 / BLOCKED
#     category: economic / general / industry / specialized
#     note: 비고
# ══════════════════════════════════════════════════════════════════

